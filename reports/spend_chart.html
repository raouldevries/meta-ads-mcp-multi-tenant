<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My35' Ad Spend - Last 7 Days</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 40px;
            color: #fff;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            margin-bottom: 10px;
            font-size: 2.5rem;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 40px;
            font-size: 1.1rem;
        }
        .chart-container {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 40px;
        }
        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .stat-card h3 {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 10px;
        }
        .stat-card .value {
            font-size: 1.8rem;
            font-weight: bold;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .legend-custom {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            color: #ccc;
        }
        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>My35' Ad Spend</h1>
        <p class="subtitle">Daily spending across all locations (Jan 16 - Jan 22, 2026)</p>

        <div class="chart-container">
            <canvas id="spendChart"></canvas>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>Total Spend (7 days)</h3>
                <div class="value" id="totalSpend">-</div>
            </div>
            <div class="stat-card">
                <h3>Daily Average</h3>
                <div class="value" id="dailyAvg">-</div>
            </div>
            <div class="stat-card">
                <h3>Highest Day</h3>
                <div class="value" id="highestDay">-</div>
            </div>
            <div class="stat-card">
                <h3>Top Spender</h3>
                <div class="value" id="topSpender">-</div>
            </div>
        </div>
    </div>

    <script>
        const data = {
            "My35' Echt": {
                "2026-01-16": 20.88, "2026-01-17": 23.34, "2026-01-18": 30.82,
                "2026-01-19": 25.7, "2026-01-20": 24.6, "2026-01-21": 27.97, "2026-01-22": 24.14
            },
            "My35' Weert": {
                "2026-01-16": 17.54, "2026-01-17": 20.11, "2026-01-18": 23.78,
                "2026-01-19": 20.92, "2026-01-20": 21.46, "2026-01-21": 18.96, "2026-01-22": 19.73
            },
            "My35' Budel": {
                "2026-01-16": 16.8, "2026-01-17": 15.66, "2026-01-18": 19.22,
                "2026-01-19": 17.4, "2026-01-20": 19.29, "2026-01-21": 15.3, "2026-01-22": 17.01
            },
            "My35' Roermond": {
                "2026-01-16": 22.87, "2026-01-17": 24.64, "2026-01-18": 28.61,
                "2026-01-19": 26.79, "2026-01-20": 24.9, "2026-01-21": 27.92, "2026-01-22": 28.25
            },
            "My35' Elst & Nijmegen": {
                "2026-01-16": 80.1, "2026-01-17": 80.8, "2026-01-18": 100.39,
                "2026-01-19": 94.86, "2026-01-20": 89.14, "2026-01-21": 89.45, "2026-01-22": 93.45
            },
            "My35' Sittard": {
                "2026-01-16": 5.5, "2026-01-17": 5.47, "2026-01-18": 7.16,
                "2026-01-19": 5.16, "2026-01-20": 5.06, "2026-01-21": 5.4, "2026-01-22": 4.62
            },
            "My35' Nuth": {
                "2026-01-16": 22.32, "2026-01-17": 20.21, "2026-01-18": 27.18,
                "2026-01-19": 25.0, "2026-01-20": 24.76, "2026-01-21": 23.47, "2026-01-22": 29.67
            },
            "My35' Reuver": {
                "2026-01-16": 15.02, "2026-01-17": 14.07, "2026-01-18": 17.37,
                "2026-01-19": 17.6, "2026-01-20": 18.27, "2026-01-21": 16.27, "2026-01-22": 14.18
            },
            "My35' Kerkrade": {
                "2026-01-16": 17.24, "2026-01-17": 18.67, "2026-01-18": 21.7,
                "2026-01-19": 21.06, "2026-01-20": 19.76, "2026-01-21": 20.7, "2026-01-22": 23.74
            }
        };

        const colors = [
            '#667eea', '#764ba2', '#f093fb', '#f5576c', '#4facfe',
            '#00f2fe', '#43e97b', '#fa709a', '#fee140', '#30cfd0'
        ];

        const dates = ['2026-01-16', '2026-01-17', '2026-01-18', '2026-01-19', '2026-01-20', '2026-01-21', '2026-01-22'];
        const labels = dates.map(d => {
            const date = new Date(d);
            return date.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
        });

        const datasets = Object.entries(data).map(([name, values], index) => ({
            label: name,
            data: dates.map(d => values[d] || 0),
            borderColor: colors[index % colors.length],
            backgroundColor: colors[index % colors.length] + '20',
            borderWidth: 3,
            tension: 0.4,
            pointRadius: 5,
            pointHoverRadius: 8,
            pointBackgroundColor: colors[index % colors.length],
            fill: false
        }));

        const ctx = document.getElementById('spendChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: { labels, datasets },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                aspectRatio: 2,
                interaction: {
                    mode: 'index',
                    intersect: false
                },
                plugins: {
                    legend: {
                        position: 'bottom',
                        labels: {
                            color: '#ccc',
                            padding: 20,
                            usePointStyle: true,
                            pointStyle: 'circle'
                        }
                    },
                    tooltip: {
                        backgroundColor: 'rgba(0, 0, 0, 0.8)',
                        titleColor: '#fff',
                        bodyColor: '#ccc',
                        padding: 15,
                        cornerRadius: 10,
                        callbacks: {
                            label: function(context) {
                                return context.dataset.label + ': €' + context.parsed.y.toFixed(2);
                            }
                        }
                    }
                },
                scales: {
                    x: {
                        grid: { color: 'rgba(255, 255, 255, 0.1)' },
                        ticks: { color: '#888' }
                    },
                    y: {
                        grid: { color: 'rgba(255, 255, 255, 0.1)' },
                        ticks: {
                            color: '#888',
                            callback: function(value) { return '€' + value; }
                        },
                        beginAtZero: true
                    }
                }
            }
        });

        // Calculate stats
        let totalSpend = 0;
        let dailyTotals = {};
        let accountTotals = {};

        Object.entries(data).forEach(([account, values]) => {
            let accountTotal = 0;
            Object.entries(values).forEach(([date, spend]) => {
                totalSpend += spend;
                accountTotal += spend;
                dailyTotals[date] = (dailyTotals[date] || 0) + spend;
            });
            accountTotals[account] = accountTotal;
        });

        const highestDayEntry = Object.entries(dailyTotals).sort((a, b) => b[1] - a[1])[0];
        const topSpenderEntry = Object.entries(accountTotals).sort((a, b) => b[1] - a[1])[0];

        document.getElementById('totalSpend').textContent = '€' + totalSpend.toFixed(2);
        document.getElementById('dailyAvg').textContent = '€' + (totalSpend / 7).toFixed(2);
        document.getElementById('highestDay').textContent = new Date(highestDayEntry[0]).toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
        document.getElementById('topSpender').textContent = topSpenderEntry[0].replace("My35' ", "");
    </script>
</body>
</html>
